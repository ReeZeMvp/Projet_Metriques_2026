<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .card h1 {
      color: #fff;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .card p.subtitle {
      color: rgba(255, 255, 255, 0.55);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: block;
      color: rgba(255, 255, 255, 0.75);
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
    }

    .field input,
    .field textarea {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .field input::placeholder,
    .field textarea::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .field input:focus,
    .field textarea:focus {
      border-color: #7c5cfc;
      box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.25);
    }

    .field textarea {
      resize: vertical;
      min-height: 120px;
    }

    .row {
      display: flex;
      gap: 16px;
    }

    .row .field {
      flex: 1;
    }

    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #7c5cfc, #a855f7);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 8px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(124, 92, 252, 0.45);
    }

    button:active {
      transform: translateY(0);
    }

    .toast {
      display: none;
      margin-top: 20px;
      padding: 14px;
      background: rgba(52, 211, 153, 0.15);
      border: 1px solid rgba(52, 211, 153, 0.3);
      border-radius: 12px;
      color: #34d399;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Contactez-moi</h1>
    <p class="subtitle">Un message, une question ? Remplissez le formulaire ci-dessous.</p>

    <div class="row">
      <div class="field">
        <label for="nom">Nom</label>
        <input type="text" id="nom" placeholder="Dupont" />
      </div>
      <div class="field">
        <label for="prenom">Prénom</label>
        <input type="text" id="prenom" placeholder="Marie" />
      </div>
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="marie.dupont@email.com" />
    </div>

    <div class="field">
      <label for="message">Message</label>
      <textarea id="message" placeholder="Votre message..."></textarea>
    </div>

    <button onclick="envoyer()">Envoyer le message</button>

    <div class="toast" id="toast">Merci pour votre message ! Je vous répondrai rapidement.</div>
  </div>

  <script>
    function envoyer() {
      const nom = document.getElementById('nom').value.trim();
      const prenom = document.getElementById('prenom').value.trim();
      const message = document.getElementById('message').value.trim();

      if (!nom || !prenom || !message) {
        alert('Merci de remplir au minimum le nom, le prénom et le message.');
        return;
      }

      document.getElementById('toast').style.display = 'block';
      document.getElementById('nom').value = '';
      document.getElementById('prenom').value = '';
      document.getElementById('email').value = '';
      document.getElementById('message').value = '';
    }
  </script>
</body>
</html>
